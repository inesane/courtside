# fly.toml app configuration file generated for courtside on 2026-05-18T20:49:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'courtside'
primary_region = 'iad'

[build]

[env]
  DB_PATH = '/data/courtside.db'
  PORT = '8080'

[[mounts]]
  source = 'courtside_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
